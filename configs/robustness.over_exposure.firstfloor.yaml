# =============================================================================
# HW1 eval config — first floor · over exposure
# Auto-generated (scripts/... gen_configs). Edit severities here during the
# tuning pass. NOTE: for .npy pose-trajectory replay the agent is teleported to
# each pose, so `agent.start_position` is cosmetic — the FLOOR is selected by
# which trajectories/<floor>.npy the evaluator replays. output.root is a default;
# evaluate.py overrides it via --output-root.
# =============================================================================
seed: 0

scene:
  path: "replica_v1/apartment_0/habitat/mesh_semantic.ply"

agent:
  start_position: [0.0, 0.0, 0.0]
  move_forward: 0.2
  move_backward: 0.2
  turn_left: 6.0
  turn_right: 6.0

camera:
  width: 512
  height: 512
  hfov: 90.0
  position: [0.0, 1.5, 0.0]
  orientation: [0.0, 0.0, 0.0]

birdseye:
  width: 512
  height: 512
  hfov: 90.0
  position: [0.0, 2.5, 0.0]
  orientation: [-1.5708, 0.0, 0.0]

marker:
  enabled: false
  size: [0.4, 0.05, 0.4]
  height_offset: 0.03
  forward_offset: 1.0

lighting:
  brightness: 2.5
  contrast: 1.0
  gamma: 1.0
  ambient_rgb: [1.0, 1.0, 1.0]
  amplitude: 0.0
  frequency: 0.0
  phase: 0.0

depth:
  enabled: true
  stuck: false
  noise_std: 0.005          # B2: nonzero base so light_noise_gain couples
  dropout_prob: 0.0
  min_range: 0.0
  max_range: 10.0
  quantization: 0.0
  redwood: false
  redwood_multiplier: 1.0
  # --- ambient-light coupling (stress = |exposure - light_nominal|) ---
  light_nominal: 1.0
  light_noise_gain: 4.0
  light_dropout_gain: 0.3
  light_range_gain: 0.4

display:
  scale: 1.0
  show_rgb: true
  show_depth: true
  show_birdseye: true

output:
  root: "eval/_data/first_floor/over_exposure/"
  save_rgb: true
  save_depth: true
  save_semantic: false
  clear_existing: true
