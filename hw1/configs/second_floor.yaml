# =============================================================================
# HW1 config — second floor. THE single hw1 config.
# Consumed by hw1/load.py (interactive collection) and scripts/evaluate.py
# (two-run flow: scheduler off -> baseline/, scheduler on -> mixed/).
#
# Baseline values sourced from configs/baseline.secondfloor.yaml.
# Reconciliation vs scripts/config.yaml drift (baseline.secondfloor.yaml WON on
# every conflict):
#   - actuation: scripts/config.yaml had 0.25 m / 10.0 deg -> kept 0.2 m / 6.0 deg
#   - depth.noise_std: scripts/config.yaml had 0.0 -> kept 0.005 (nonzero base so
#     light_noise_gain couples)
#   - depth light gains: scripts/config.yaml had dropout 0.9 / range 0.1 (and
#     noise gain 0.0) -> kept noise 4.0 / dropout 0.3 / range 0.4
#   - output.save_semantic: scripts/config.yaml had true -> kept false
#
# Single-seed policy: no top-level `seed:` — uncertainties.seed governs both the
# scheduler window sampling and the per-frame depth RNG.
# =============================================================================

scene:
  path: "replica_v1/apartment_0/habitat/mesh_semantic.ply"

agent:
  # P0.2 snap-check result: requested (0, 8.0, 0) is above the navmesh (bounds
  # top out at y=5.37 -> snap_point returned NaN). (0, y, 0) IS on the second
  # floor: pathfinder.snap_point -> (0.0, 1.4252348, 0.0), navigable. Floor
  # heights in apartment_0: first ~= -1.57, second ~= 1.43. start_position is
  # search_traj's floor selector (snap origin + floor_tol filter), NOT cosmetic.
  start_position: [0.0, 1.4252348, 0.0]
  move_forward: 0.2
  move_backward: 0.2
  turn_left: 6.0
  turn_right: 6.0

# evaluate replay input; missing file = hard error
trajectory: trajectories/secondfloor.npy

camera:
  width: 512
  height: 512
  hfov: 90.0
  position: [0.0, 1.5, 0.0]
  orientation: [0.0, 0.0, 0.0]

birdseye:
  width: 512
  height: 512
  hfov: 90.0
  position: [0.0, 2.5, 0.0]
  orientation: [-1.5708, 0.0, 0.0]

marker:
  enabled: false
  size: [0.4, 0.05, 0.4]
  height_offset: 0.03
  forward_offset: 1.0

lighting:
  # Baseline photometric model only. Legacy static flicker keys
  # (amplitude/frequency/phase) removed — flicker now comes exclusively from
  # scheduler windows (uncertainties.types.flicker).
  brightness: 1.0
  contrast: 1.0
  gamma: 1.0
  ambient_rgb: [1.0, 1.0, 1.0]

depth:
  # Always-on baseline sensor model (unchanged from baseline.secondfloor.yaml);
  # the uncertainty scheduler only overlays temporal windows on top of this.
  enabled: true
  stuck: false
  noise_std: 0.005          # nonzero base so light_noise_gain couples
  dropout_prob: 0.0
  min_range: 0.0
  max_range: 10.0
  quantization: 0.0
  redwood: false
  redwood_multiplier: 1.0
  # --- ambient-light coupling (stress = |exposure - light_nominal|) ---
  light_nominal: 1.0
  light_noise_gain: 4.0
  light_dropout_gain: 0.3
  light_range_gain: 0.4

uncertainties:
  enabled: true                  # evaluate.py flips false for the baseline run
  # seed + gap_s tuned against the committed 454-pose trajectory (15.1 s at
  # 30 fps): seed 20 with gap_s [2,6] realizes all three effect types in-episode
  # (over_exposure 3.1-5.5s, flicker 9.6-11.8s, low_light 14.1-15.4s). The
  # original gap_s [8,25] put the first window past the episode end -> mixed
  # run degenerated to baseline.
  seed: 20                       # single seed: scheduler + per-frame depth RNG
  gap_s: [2.0, 6.0]              # clean time between windows, uniform per gap
  duration_s: [1.0, 4.0]         # window length, uniform per window
  types:                         # fixed per-type severity (not sampled)
    flicker:       { amplitude: 0.9, frequency: 1.2 }
    low_light:     { brightness: 0.3, gamma: 1.4 }
    over_exposure: { brightness: 1.6, contrast: 1.2 }

display:
  scale: 1.0
  show_rgb: true
  show_depth: true
  show_birdseye: true

output:
  root: "eval/_data/second_floor/"   # evaluate appends baseline/ | mixed/
  save_rgb: true
  save_depth: true
  save_semantic: false               # ontology consumes rgb/depth only
  clear_existing: true
