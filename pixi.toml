# pixi workspace for the TAICA course. See docs/pixi.md for details.

[workspace]
name = "taica-course"
version = "0.1.0"
channels = ["conda-forge", "aihabitat"]
platforms = ["linux-64"]

[feature.habitat.dependencies]
python = "3.9.*"
cmake = "3.27.*"
numpy = "1.26.4.*"
habitat-sim = { version = "0.3.3.*", channel = "aihabitat" }
withbullet = { version = "*", channel = "aihabitat" }
gdown = "*"

[feature.habitat.pypi-dependencies]
habitat-lab = { path = "dependencies/habitat-lab/habitat-lab", editable = true }
opencv-python = "==4.8.0.76"
open3d = "*"

[feature.habitat.tasks]
smoke = { cmd = "python -c \"import habitat_sim, habitat; print('habitat-sim', habitat_sim.__version__); print('habitat-lab', habitat.__version__); print('bullet build:', habitat_sim.built_with_bullet)\"" }
fetch-replica = { cmd = "mkdir -p replica_v1 && gdown https://drive.google.com/uc?id=1zHA2AYRtJOmlRaHNuXOvC_OaVxHe56M4 -O replica_v1/apartment_0.zip && unzip -o replica_v1/apartment_0.zip -d replica_v1 && rm replica_v1/apartment_0.zip" }

[environments]
habitat = { features = ["habitat"], solve-group = "habitat" }
